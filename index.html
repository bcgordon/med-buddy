<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MedBuddy">
<meta name="theme-color" content="#D4537E">
<link id="apple-touch-icon" rel="apple-touch-icon" sizes="512x512">
<title>MedBuddy 💊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --pink:#D4537E;--pink-l:#FBEAF0;--pink-d:#72243E;--pink-m:#ED93B1;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#085041;--teal-m:#5DCAA5;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-d:#633806;
  --purple:#7F77DD;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --red:#E24B4A;--red-l:#FCEBEB;
  --bg:#F5F4F0;--text:#1A1A18;--text2:#888880;--text3:#BBB8B0;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:#E8E6E0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
#app{max-width:430px;width:100%;height:100dvh;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}

/* LOCK */
#lock{position:absolute;inset:0;background:#FFF5F8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding-bottom:var(--safe-bot);}
.lk-pill{background:var(--pink-l);border:2px solid var(--pink-m);border-radius:32px;padding:12px 26px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.lk-icon{font-size:30px;}
.lk-name{font-size:22px;font-weight:700;color:var(--pink-d);}
.lk-sub{font-size:14px;color:var(--text3);margin-bottom:28px;}
.dots{display:flex;gap:14px;margin-bottom:28px;}
.dot{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--pink);background:transparent;transition:background .12s,transform .12s;}
.dot.on{background:var(--pink);transform:scale(1.15);}
.dot.err{border-color:var(--red);background:var(--red);}
.kpad{display:grid;grid-template-columns:repeat(3,76px);gap:12px;}
.key{width:76px;height:76px;border-radius:50%;background:white;border:2px solid #EEECEA;font-size:24px;font-weight:500;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;transition:background .08s,transform .1s;}
.key:active{background:var(--pink-l);transform:scale(.91);}
.ksub{font-size:9px;color:var(--text3);letter-spacing:.12em;margin-top:1px;}
.key.sp{background:var(--bg);border-color:#E8E6E0;font-size:20px;color:var(--text2);}
.perr{color:var(--red);font-size:13px;font-weight:600;min-height:20px;margin-top:10px;}
.hint{font-size:12px;color:var(--text3);margin-top:10px;text-align:center;max-width:270px;line-height:1.5;}

/* SHELL */
#shell{display:none;flex-direction:column;height:100%;}
#shell.on{display:flex;}

/* TOPBAR */
.topbar{background:white;padding:10px 16px;padding-top:calc(var(--safe-top) + 10px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #EEECEA;flex-shrink:0;}
.tl{display:flex;align-items:center;gap:10px;}
.t-logo{font-size:24px;}
.t-title{font-size:20px;font-weight:700;color:var(--pink-d);}
.t-date{font-size:12px;color:var(--text3);}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:12px;font-size:22px;}
.icon-btn:active{background:var(--pink-l);}

/* NAV */
.nav{background:white;border-top:1px solid #EEECEA;display:flex;align-items:stretch;flex-shrink:0;padding-bottom:var(--safe-bot);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:8px 0;color:var(--text3);position:relative;}
.ni.on{color:var(--pink);}
.ni-icon{font-size:24px;line-height:1;}
.ni-lbl{font-size:10px;font-weight:600;letter-spacing:.02em;}
.nbadge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--red);color:white;font-size:9px;font-weight:800;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative;}
.pg{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:var(--bg);}
.pg.on{display:block;}
.pgpad{padding:14px 14px 40px;}

/* UTIL */
.slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:18px 0 8px;padding:0 2px;}
.slbl:first-child{margin-top:0;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.7;}
.empty-icon{font-size:44px;margin-bottom:12px;}

/* TODAY */
.hero{background:white;border-radius:20px;padding:18px;margin-bottom:14px;border:1px solid #EEECEA;}
.hero-greet{font-size:22px;font-weight:700;color:var(--pink-d);}
.hero-sub{font-size:14px;color:var(--text2);margin-top:3px;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
.stat{background:var(--bg);border-radius:12px;padding:10px 6px;text-align:center;}
.stat-n{font-size:24px;font-weight:700;}
.stat-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.stat.p .stat-n{color:var(--pink-d);} .stat.p .stat-l{color:var(--pink);}
.stat.t .stat-n{color:var(--teal-d);} .stat.t .stat-l{color:var(--teal);}
.stat.a .stat-n{color:var(--amber-d);} .stat.a .stat-l{color:var(--amber);}

.sg{margin-bottom:16px;}
.sth{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.stl{flex:1;height:1px;background:#EEECEA;}
.stlbl{font-size:12px;font-weight:700;color:var(--text3);white-space:nowrap;}

.med-row{background:white;border-radius:14px;border:1px solid #EEECEA;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.med-row.done{opacity:.48;}
.chk{width:30px;height:30px;border-radius:50%;border:2.5px solid #DDDBD5;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
.chk.on{background:var(--teal);border-color:var(--teal);}
.chk-mark{color:white;font-size:15px;font-weight:800;display:none;}
.chk.on .chk-mark{display:block;}
.mi{flex:1;min-width:0;}
.mn{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.md{font-size:12px;color:var(--text2);margin-top:2px;}
.mwho{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.w0{background:var(--pink-l);color:var(--pink-d);}
.w1{background:var(--teal-l);color:var(--teal-d);}
.w2{background:var(--amber-l);color:var(--amber-d);}
.w3{background:var(--purple-l);color:var(--purple-d);}
.w4{background:#EAF3DE;color:#27500A;}
.w5{background:#FFF5F8;color:#72243E;}

/* KIDS */
.kid-tabs-old-placeholder{}
.ktab{min-width:80px;padding:11px 10px;background:white;border:1.5px solid #EEECEA;border-radius:14px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;}
.ktab.on{background:var(--pink-l);border-color:var(--pink-m);color:var(--pink-d);}
.kpanel{display:none;}
.kpanel.on{display:block;}
.av-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:white;border-radius:16px;border:1px solid #EEECEA;margin-bottom:12px;}
.av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.av0{background:var(--pink-l);color:var(--pink-d);}
.av1{background:var(--teal-l);color:var(--teal-d);}
.av2{background:var(--amber-l);color:var(--amber-d);}
.av3{background:var(--purple-l);color:var(--purple-d);}
.av4{background:var(--green-l,#EAF3DE);color:var(--green-d,#27500A);}
.av5{background:#FFF5F8;color:#72243E;}

.fgrp{background:white;border-radius:16px;border:1px solid #EEECEA;overflow:hidden;margin-bottom:12px;}
.fr{display:flex;align-items:center;padding:0 14px;border-bottom:1px solid #F5F4F0;}
.fr:last-child{border-bottom:none;}
.fl{font-size:11px;color:var(--text3);width:46px;flex-shrink:0;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.fr input,.fr select{flex:1;border:none;outline:none;padding:13px 0 13px 10px;font-size:15px;color:var(--text);background:transparent;font-family:inherit;min-width:0;}
.fr select{cursor:pointer;}

.mce{background:white;border-radius:16px;border:1px solid #EEECEA;margin-bottom:10px;overflow:hidden;}
.mce-hdr{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #F5F4F0;gap:10px;background:#FAFAF8;}
.mce-name{flex:1;font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;padding:2px 4px;line-height:1;}
.del-btn:active{color:var(--red);}

.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--teal-l);border:2px dashed var(--teal-m);border-radius:14px;padding:14px;font-size:14px;font-weight:700;color:var(--teal-d);cursor:pointer;width:100%;font-family:inherit;margin-bottom:12px;}
.add-btn:active{background:#C0EDD9;}
.save-btn{width:100%;padding:16px;background:var(--pink);color:white;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
.save-btn:active{background:var(--pink-d);transform:scale(.98);}
.add-person-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--pink-l);border:2px dashed var(--pink-m);border-radius:14px;padding:14px;font-size:14px;font-weight:700;color:var(--pink-d);cursor:pointer;width:100%;font-family:inherit;margin-top:8px;}
.add-person-btn:active{background:#F4C0D1;}
.del-person-btn{display:block;width:100%;margin-top:10px;padding:12px;background:none;border:1.5px solid var(--red);border-radius:14px;font-size:14px;font-weight:600;color:var(--red);cursor:pointer;font-family:inherit;text-align:center;}
.del-person-btn:active{background:var(--red-l);}
.kid-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.kid-tabs::-webkit-scrollbar{display:none;}

/* NOTIF */
.nbanner{background:var(--purple-l);border:1.5px solid #AFA9EC;border-radius:16px;padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;}
.nbanner-icon{font-size:22px;flex-shrink:0;}
.nbanner-txt{font-size:13px;color:var(--purple-d);line-height:1.55;}
.nbanner-txt strong{display:block;font-size:14px;margin-bottom:3px;}
.notif-btn{width:100%;padding:15px;background:var(--purple);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.notif-btn:active{background:var(--purple-d);}
.nstatus{font-size:13px;color:var(--text3);text-align:center;min-height:18px;margin-bottom:4px;}
.ncard{background:white;border-radius:16px;border:1px solid #EEECEA;overflow:hidden;margin-bottom:12px;}
.ncard-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #F5F4F0;background:#FAFAF8;}
.nwho{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.ncard-title{flex:1;font-size:15px;font-weight:600;color:var(--text);}
.nitem{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #F5F4F0;gap:12px;}
.nitem:last-child{border-bottom:none;}
.nitem-info{flex:1;}
.nitem-name{font-size:14px;font-weight:600;color:var(--text);}
.nitem-time{font-size:12px;color:var(--text3);margin-top:2px;}
.toggle{width:50px;height:30px;border-radius:15px;background:#DDDBD5;cursor:pointer;position:relative;transition:background .18s;flex-shrink:0;}
.toggle.on{background:var(--teal);}
.toggle::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:white;top:3px;left:3px;transition:left .18s;}
.toggle.on::after{left:23px;}

/* SETTINGS */
.sgrp{background:white;border-radius:16px;border:1px solid #EEECEA;overflow:hidden;margin-bottom:14px;}
.srow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #F5F4F0;gap:12px;cursor:pointer;}
.srow:last-child{border-bottom:none;}
.srow:active{background:var(--bg);}
.srow-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.srow-main{flex:1;}
.srow-lbl{font-size:15px;color:var(--text);}
.srow-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.srow-r{color:var(--text3);font-size:14px;}
.pin-row{display:flex;flex-direction:column;gap:8px;padding:12px 16px;border-bottom:1px solid #F5F4F0;}
.pin-row input{width:100%;border:1.5px solid #EEECEA;border-radius:10px;padding:10px 12px;font-size:16px;letter-spacing:4px;text-align:center;outline:none;font-family:inherit;color:var(--text);background:var(--bg);}
.pin-row input:focus{border-color:var(--pink);}
.pin-save{width:100%;padding:12px 16px;background:var(--purple);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.pin-save:active{background:var(--purple-d);}
.pin-msg{font-size:12px;padding:6px 16px 10px;min-height:18px;}

/* TOAST */
.toast{position:absolute;bottom:calc(68px + var(--safe-bot) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,26,24,.92);color:white;padding:11px 24px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

<div id="lock">
  <div class="lk-pill"><span class="lk-icon">💊</span><span class="lk-name">MedBuddy</span></div>
  <div class="lk-sub">Martha's Medication Helper</div>
  <div class="dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
  <div class="kpad">
    <div class="key" onclick="kp('1')">1<span class="ksub"> </span></div>
    <div class="key" onclick="kp('2')">2<span class="ksub">ABC</span></div>
    <div class="key" onclick="kp('3')">3<span class="ksub">DEF</span></div>
    <div class="key" onclick="kp('4')">4<span class="ksub">GHI</span></div>
    <div class="key" onclick="kp('5')">5<span class="ksub">JKL</span></div>
    <div class="key" onclick="kp('6')">6<span class="ksub">MNO</span></div>
    <div class="key" onclick="kp('7')">7<span class="ksub">PQRS</span></div>
    <div class="key" onclick="kp('8')">8<span class="ksub">TUV</span></div>
    <div class="key" onclick="kp('9')">9<span class="ksub">WXYZ</span></div>
    <div class="key sp" onclick="kp('c')">CLR</div>
    <div class="key" onclick="kp('0')">0<span class="ksub">+</span></div>
    <div class="key sp" onclick="kp('b')">⌫</div>
  </div>
  <div class="perr" id="perr"></div>
  <div class="hint" id="lk-hint"></div>
</div>

<div id="shell">
  <div class="topbar">
    <div class="tl"><span class="t-logo">💊</span><div><div class="t-title">MedBuddy</div><div class="t-date" id="topdate"></div></div></div>
    <button class="icon-btn" onclick="lockApp()">🔒</button>
  </div>
  <div class="pages">
    <div class="pg on" id="pg-today"><div class="pgpad" id="today-c"></div></div>
    <div class="pg" id="pg-kids">
      <div class="pgpad" id="kids-pgpad"></div>
    </div>
    <div class="pg" id="pg-notif"><div class="pgpad" id="notif-c"></div></div>
    <div class="pg" id="pg-settings"><div class="pgpad" id="settings-c"></div></div>
  </div>
  <nav class="nav">
    <div class="ni on" id="nav-today" onclick="goPage('today')"><div class="ni-icon">📋</div><div class="ni-lbl">Today</div><div class="nbadge" id="badge" style="display:none"></div></div>
    <div class="ni" id="nav-kids" onclick="goPage('kids')"><div class="ni-icon">🧑</div><div class="ni-lbl">People</div></div>
    <div class="ni" id="nav-notif" onclick="goPage('notif')"><div class="ni-icon">🔔</div><div class="ni-lbl">Reminders</div></div>
    <div class="ni" id="nav-settings" onclick="goPage('settings')"><div class="ni-icon">⚙️</div><div class="ni-lbl">Settings</div></div>
  </nav>
</div>

<div class="toast" id="toast"></div>
</div>
<script>
let S={people:[{name:'',meds:[]}],checks:{},notifEnabled:{}};
let pinEntry='';
let notifTimers=[];
let currentKid=0;
const MAX_PEOPLE=6;
const AVC=['av0','av1','av2','av3','av4','av5'];
const WHOC=['w0','w1','w2','w3','w4','w5'];
const FREQS={daily:'Daily',twice:'Twice/day',asneeded:'As needed',weekly:'Weekly'};

function loadS(){try{const d=localStorage.getItem('mb_v3');if(d){const p=JSON.parse(d);S=Object.assign(S,p);}if(!S.people||!S.people.length)S.people=[{name:'',meds:[]}];S.people.forEach(p=>{if(!p.meds)p.meds=[];});if(!S.checks)S.checks={};if(!S.notifEnabled)S.notifEnabled={};}catch(e){}}
function saveS(){localStorage.setItem('mb_v3',JSON.stringify(S));}
function getPin(){return localStorage.getItem('mb_pin_v3')||'1234';}
function setPin(p){localStorage.setItem('mb_pin_v3',p);}
function todayKey(){return new Date().toISOString().slice(0,10);}
function ck(pi,mi){return todayKey()+'|'+pi+'|'+mi;}
function nk(pi,mi){return pi+'|'+mi;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtTime(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return(h%12||12)+':'+(m<10?'0':'')+m+(h>=12?' PM':' AM');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300);}

// LOCK
function kp(v){
  const e=document.getElementById('perr');
  if(v==='b')pinEntry=pinEntry.slice(0,-1);
  else if(v==='c')pinEntry='';
  else{if(pinEntry.length>=4)return;pinEntry+=v;}
  udots(false);e.textContent='';
  if(pinEntry.length===4)setTimeout(chkPin,140);
}
function udots(err){for(let i=0;i<4;i++){const d=document.getElementById('d'+i);d.classList.toggle('on',!err&&i<pinEntry.length);d.classList.toggle('err',err);}}
function chkPin(){
  if(pinEntry===getPin()){
    document.getElementById('lock').style.display='none';
    document.getElementById('shell').classList.add('on');
    initTopDate();renderToday();renderKidsPage();renderNotif();renderSettings();updateBadge();schedNotifs();
  } else {
    udots(true);document.getElementById('perr').textContent='Incorrect PIN — try again';
    setTimeout(()=>{pinEntry='';udots(false);},700);
  }
}
function lockApp(){pinEntry='';udots(false);document.getElementById('perr').textContent='';document.getElementById('lock').style.display='flex';document.getElementById('shell').classList.remove('on');}

// NAV
function goPage(p){['today','kids','notif','settings'].forEach(x=>{document.getElementById('pg-'+x).classList.toggle('on',x===p);document.getElementById('nav-'+x).classList.toggle('on',x===p);});if(p==='kids')renderKidsPage();if(p==='notif')renderNotif();if(p==='settings')renderSettings();}

function initTopDate(){const d=new Date();const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];const months=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('topdate').textContent=days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate();}

// TODAY
function renderToday(){
  const c=document.getElementById('today-c');
  let total=0,done=0;
  S.people.forEach((p,pi)=>p.meds.forEach((m,mi)=>{if(!m.name||m.name.trim()===''||m.freq==='asneeded')return;total++;if(S.checks[ck(pi,mi)])done++;}));
  const hr=new Date().getHours();
  const greet=hr<12?'Good morning! ☀️':hr<17?'Good afternoon! 🌤️':'Good evening! 🌙';
  let all=[];
  S.people.forEach((p,pi)=>{
    p.meds.forEach((m,mi)=>{
      if(!m.name||m.name.trim()==='')return;
      if(m.freq==='asneeded'){all.push({m,pi,mi,t:'ZZ',lbl:'As needed'});return;}
      all.push({m,pi,mi,t:m.time||'ZA',lbl:fmtTime(m.time)||'No time set'});
      if(m.freq==='twice'&&m.time2)all.push({m,pi,mi,t:m.time2,lbl:fmtTime(m.time2),is2:true});
    });
  });
  all.sort((a,b)=>a.t.localeCompare(b.t));
  const grps={};const gOrder=[];
  all.forEach(item=>{if(!grps[item.lbl]){grps[item.lbl]=[];gOrder.push(item.lbl);}grps[item.lbl].push(item);});
  let sched='';
  if(!gOrder.length){sched=`<div class="empty-state"><div class="empty-icon">🌟</div>No medications added yet.<br>Tap <strong>Kids</strong> below to get started!</div>`;}
  else gOrder.forEach(lbl=>{
    sched+=`<div class="sg"><div class="sth"><span class="stlbl">${lbl}</span><div class="stl"></div></div>`;
    grps[lbl].forEach(({m,pi,mi})=>{
      const isDone=!!S.checks[ck(pi,mi)];
      const pn=S.people[pi].name||'Person '+(pi+1);
      const init=pn.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const detail=[pn,m.dose,m.notes].filter(Boolean).join(' · ');
      sched+=`<div class="med-row${isDone?' done':''}"><div class="chk${isDone?' on':''}" onclick="toggleChk(${pi},${mi})"><span class="chk-mark">✓</span></div><div class="mi"><div class="mn">${esc(m.name)}</div><div class="md">${esc(detail)}</div></div><div class="mwho ${WHOC[pi%WHOC.length]}">${init}</div></div>`;
    });
    sched+='</div>';
  });
  c.innerHTML=`<div class="hero"><div class="hero-greet">${greet}</div><div class="hero-sub">${total===0?'Ready to add medications!':(done===total&&total>0)?'All done today! 🎉':`${total-done} of ${total} remaining`}</div><div class="stats"><div class="stat p"><div class="stat-n">${total}</div><div class="stat-l">Total</div></div><div class="stat t"><div class="stat-n">${done}</div><div class="stat-l">Done</div></div><div class="stat a"><div class="stat-n">${total-done}</div><div class="stat-l">Left</div></div></div></div>${sched}`;
}
function toggleChk(pi,mi){const k=ck(pi,mi);if(S.checks[k])delete S.checks[k];else S.checks[k]=true;saveS();renderToday();updateBadge();}
function updateBadge(){let n=0;S.people.forEach((p,pi)=>p.meds.forEach((m,mi)=>{if(!m.name||m.name.trim()===''||m.freq==='asneeded')return;if(!S.checks[ck(pi,mi)])n++;}));const b=document.getElementById('badge');if(n>0){b.style.display='block';b.textContent=n;}else b.style.display='none';}

// KIDS
function renderKidsPage(){
  const wrap=document.getElementById('kids-pgpad');
  const n=S.people.length;
  // Build tabs
  let tabs='<div class="kid-tabs" id="kid-tabs-row">';
  S.people.forEach((p,i)=>{
    const nm=p.name&&p.name.trim()?p.name.trim():'Person '+(i+1);
    tabs+=`<div class="ktab${i===currentKid?' on':''}" id="kt${i}" onclick="switchKid(${i})">${nm}</div>`;
  });
  tabs+='</div>';
  // Build panels
  let panels='';
  S.people.forEach((_,i)=>{ panels+=`<div id="kp${i}" class="kpanel${i===currentKid?' on':''}"></div>`; });
  // Add person button (if under max)
  const addPersonBtn=n<MAX_PEOPLE?`<button class="add-person-btn" onclick="addPerson()">+ Add Person</button>`:'';
  wrap.innerHTML=tabs+panels+addPersonBtn;
  S.people.forEach((_,i)=>renderKid(i));
}
function switchKid(i){
  currentKid=i;
  S.people.forEach((_,j)=>{
    const t=document.getElementById('kt'+j);const p=document.getElementById('kp'+j);
    if(t)t.classList.toggle('on',j===i);
    if(p)p.classList.toggle('on',j===i);
  });
}
function addPerson(){
  if(S.people.length>=MAX_PEOPLE){toast('Maximum 6 people');return;}
  S.people.push({name:'',meds:[]});
  currentKid=S.people.length-1;
  saveS();renderKidsPage();renderToday();renderNotif();updateBadge();
  toast('Person added!');
}
function renderKid(i){
  const p=S.people[i];
  const panel=document.getElementById('kp'+i);
  if(!panel)return;
  const avIdx=i%AVC.length;
  const init=p.name?p.name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
  let mh='';
  if(!p.meds.length)mh=`<div style="text-align:center;color:var(--text3);font-size:14px;padding:20px 0 8px;">No medications yet</div>`;
  else p.meds.forEach((m,mi)=>{
    const t2=m.freq==='twice'?`<div class="fr"><span class="fl">Time 2</span><input type="time" value="${esc(m.time2||'')}" oninput="umed(${i},${mi},'time2',this.value)"></div>`:'';
    mh+=`<div class="mce"><div class="mce-hdr"><span style="font-size:20px;">💊</span><span class="mce-name">${esc(m.name)||'New medication'}</span><button class="del-btn" onclick="delMed(${i},${mi})">×</button></div><div class="fgrp" style="border-radius:0;border:none;"><div class="fr"><span class="fl">Name</span><input type="text" value="${esc(m.name||'')}" placeholder="Medication name" oninput="umed(${i},${mi},'name',this.value)"></div><div class="fr"><span class="fl">Dose</span><input type="text" value="${esc(m.dose||'')}" placeholder="e.g. 5ml, 1 tablet" oninput="umed(${i},${mi},'dose',this.value)"></div><div class="fr"><span class="fl">Time</span><input type="time" value="${esc(m.time||'')}" oninput="umed(${i},${mi},'time',this.value)"></div><div class="fr"><span class="fl">Freq</span><select oninput="umed(${i},${mi},'freq',this.value)"><option value="daily" ${(!m.freq||m.freq==='daily')?'selected':''}>Daily</option><option value="twice" ${m.freq==='twice'?'selected':''}>Twice a day</option><option value="asneeded" ${m.freq==='asneeded'?'selected':''}>As needed</option><option value="weekly" ${m.freq==='weekly'?'selected':''}>Weekly</option></select></div>${t2}<div class="fr"><span class="fl">Notes</span><input type="text" value="${esc(m.notes||'')}" placeholder="With food, special instructions..." oninput="umed(${i},${mi},'notes',this.value)"></div></div></div>`;
  });
  const delPersonBtn=S.people.length>1?`<button class="del-person-btn" onclick="delPerson(${i})">Remove this person</button>`:'';
  panel.innerHTML=`<div class="av-row"><div class="av ${AVC[avIdx]}" id="av${i}">${init}</div><input type="text" value="${esc(p.name||'')}" placeholder="Enter name" style="flex:1;border:none;outline:none;font-size:18px;font-weight:600;color:var(--text);background:transparent;font-family:inherit;" oninput="uname(${i},this.value)"></div><div class="slbl">Medications</div>${mh}<button class="add-btn" onclick="addMed(${i})">+ Add Medication</button><button class="save-btn" onclick="saveKid(${i})">Save</button>${delPersonBtn}`;
}
function uname(i,v){
  S.people[i].name=v;
  const init=v?v.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
  const a=document.getElementById('av'+i);if(a)a.textContent=init;
  const t=document.getElementById('kt'+i);if(t)t.textContent=v.trim()||'Person '+(i+1);
}
function umed(pi,mi,f,v){S.people[pi].meds[mi][f]=v;if(f==='freq')renderKid(pi);}
function addMed(i){S.people[i].meds.push({name:'',dose:'',time:'',freq:'daily',notes:''});saveS();renderKid(i);}
function delMed(i,mi){if(!confirm('Remove this medication?'))return;S.people[i].meds.splice(mi,1);saveS();renderKid(i);renderToday();updateBadge();}
function delPerson(i){
  if(S.people.length<=1){toast("Can't remove last person");return;}
  const nm=S.people[i].name||'Person '+(i+1);
  if(!confirm('Remove '+nm+' and all their medications?'))return;
  S.people.splice(i,1);
  currentKid=Math.min(currentKid,S.people.length-1);
  saveS();renderKidsPage();renderToday();renderNotif();updateBadge();
}
function saveKid(i){saveS();renderToday();renderNotif();updateBadge();schedNotifs();toast('Saved! ✓');}

// NOTIFICATIONS
function renderNotif(){
  const c=document.getElementById('notif-c');
  const perm=('Notification' in window)?Notification.permission:'unsupported';
  const statusMsg=perm==='granted'?'✅ Notifications enabled':perm==='denied'?'❌ Blocked — go to iPhone Settings > Safari > Notifications to allow':perm==='unsupported'?'⚠️ For notifications, add to your Home Screen via Safari Share (↑)':'Tap below to enable push notifications';
  const btnHtml=perm!=='granted'&&perm!=='denied'&&perm!=='unsupported'?`<button class="notif-btn" onclick="reqNotif()">Enable Notifications 🔔</button>`:'';
  let cards='';let any=false;
  S.people.forEach((p,pi)=>{
    const valid=p.meds.filter(m=>m.name&&m.name.trim()!==''&&m.freq!=='asneeded');
    if(!valid.length)return;any=true;
    const nm=p.name||'Person '+(pi+1);
    const init=nm.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    let items='';
    p.meds.forEach((m,mi)=>{
      if(!m.name||m.name.trim()===''||m.freq==='asneeded')return;
      const isOn=!!S.notifEnabled[nk(pi,mi)];
      const t2=m.freq==='twice'&&m.time2?' & '+fmtTime(m.time2):'';
      items+=`<div class="nitem"><div class="nitem-info"><div class="nitem-name">${esc(m.name)}</div><div class="nitem-time">${fmtTime(m.time)||'No time set'}${t2} · ${FREQS[m.freq]}</div></div><div class="toggle${isOn?' on':''}" onclick="togNotif(${pi},${mi})" id="ntog${pi}${mi}"></div></div>`;
    });
    cards+=`<div class="ncard"><div class="ncard-hdr"><div class="nwho ${AVC[pi%AVC.length]}">${init}</div><div class="ncard-title">${esc(nm)}</div></div>${items}</div>`;
  });
  if(!any)cards=`<div class="empty-state"><div class="empty-icon">🔔</div>Add medications in the Kids tab<br>to set up reminders here.</div>`;
  c.innerHTML=`<div class="nbanner"><span class="nbanner-icon">💡</span><div class="nbanner-txt"><strong>How reminders work</strong>MedBuddy sends a notification at each medication time. For this to work, open in Safari and tap Share (↑) > "Add to Home Screen".</div></div>${btnHtml}<div class="nstatus">${statusMsg}</div><div class="slbl" style="margin-top:12px;">Reminder schedule</div>${cards}`;
}
function togNotif(pi,mi){
  if(('Notification' in window)&&Notification.permission!=='granted'){toast('Enable notifications first');return;}
  const k=nk(pi,mi);S.notifEnabled[k]=!S.notifEnabled[k];saveS();
  const t=document.getElementById('ntog'+pi+mi);if(t)t.classList.toggle('on',!!S.notifEnabled[k]);
  schedNotifs();toast(S.notifEnabled[k]?'Reminder on 🔔':'Reminder off');
}
function reqNotif(){
  if(!('Notification' in window)){toast('Add to Home Screen first');return;}
  Notification.requestPermission().then(p=>{renderNotif();if(p==='granted'){toast('Notifications enabled! 🎉');schedNotifs();}else toast('Permission not granted');});
}
function schedNotifs(){
  notifTimers.forEach(t=>clearTimeout(t));notifTimers=[];
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const now=new Date();
  S.people.forEach((p,pi)=>p.meds.forEach((m,mi)=>{
    if(!m.name||!S.notifEnabled[nk(pi,mi)])return;
    ['time','time2'].forEach(tf=>{
      if(tf==='time2'&&m.freq!=='twice')return;
      const t=m[tf];if(!t)return;
      const[h,mn]=t.split(':').map(Number);
      const fire=new Date();fire.setHours(h,mn,0,0);
      if(fire<=now)fire.setDate(fire.getDate()+1);
      const tid=setTimeout(()=>{
        try{new Notification('💊 MedBuddy',{body:`Time for ${m.name} — ${p.name||'Person '+(pi+1)}${m.dose?' ('+m.dose+')':''}`,tag:'mb'+pi+mi+tf});}catch(e){}
        schedNotifs();
      },fire-now);
      notifTimers.push(tid);
    });
  }));
}

// SETTINGS
function renderSettings(){
  document.getElementById('settings-c').innerHTML=`
    <div class="slbl">Security</div>
    <div class="sgrp">
      <div class="srow" style="cursor:default;"><span class="srow-icon">🔑</span><div class="srow-main"><div class="srow-lbl">Change PIN</div><div class="srow-sub">Default PIN is 1234</div></div></div>
      <div class="pin-row"><input type="password" inputmode="numeric" maxlength="4" id="np1" placeholder="New PIN"><input type="password" inputmode="numeric" maxlength="4" id="np2" placeholder="Confirm"><button class="pin-save" onclick="changePin()">Save</button></div>
      <div class="pin-msg" id="pmsg"></div>
    </div>
    <div class="slbl">Install as app</div>
    <div class="sgrp">
      <div class="srow" style="flex-direction:column;align-items:flex-start;gap:10px;cursor:default;">
        <div style="display:flex;align-items:center;gap:10px;width:100%;"><span class="srow-icon">📱</span><div class="srow-lbl">Add to Home Screen</div></div>
        <div style="font-size:13px;color:var(--text2);line-height:1.65;padding-left:38px;">In <strong>Safari</strong>, tap the <strong>Share button ↑</strong> at the bottom of the screen, then tap <strong>"Add to Home Screen"</strong>. MedBuddy will work like a native app — full screen, with notifications!</div>
      </div>
    </div>
    <div class="slbl">Daily checklist</div>
    <div class="sgrp">
      <div class="srow" style="cursor:default;"><span class="srow-icon">🔄</span><div class="srow-main"><div class="srow-lbl">Auto-reset at midnight</div><div class="srow-sub">Checkboxes clear every day automatically</div></div><span class="srow-r">On</span></div>
    </div>
    <div class="slbl">Data</div>
    <div class="sgrp">
      <div class="srow" onclick="clearChks()"><span class="srow-icon">🧹</span><div class="srow-main"><div class="srow-lbl">Clear today's checks</div></div><span class="srow-r">›</span></div>
      <div class="srow" onclick="resetAll()"><span class="srow-icon">⚠️</span><div class="srow-main"><div class="srow-lbl" style="color:var(--red);">Reset all data</div><div class="srow-sub">Removes all kids and medications</div></div><span class="srow-r">›</span></div>
    </div>
    <div style="text-align:center;padding:20px;font-size:12px;color:var(--text3);line-height:1.8;">MedBuddy v1.0<br>Made with 💊 for Martha<br>All data stored locally on this device</div>`;
}
function changePin(){
  const n=document.getElementById('np1').value,cv=document.getElementById('np2').value,m=document.getElementById('pmsg');
  if(!/^\d{4}$/.test(n)){m.style.color='var(--red)';m.textContent='PIN must be exactly 4 digits.';return;}
  if(n!==cv){m.style.color='var(--red)';m.textContent='PINs do not match.';return;}
  setPin(n);m.style.color='var(--teal-d)';m.textContent='PIN updated! ✓';
  document.getElementById('np1').value='';document.getElementById('np2').value='';
}
function clearChks(){S.checks={};saveS();renderToday();updateBadge();toast("Today's checks cleared");}
function resetAll(){if(!confirm('Reset ALL data? Cannot be undone.'))return;S={people:[{name:'',meds:[]}],checks:{},notifEnabled:{}};currentKid=0;saveS();renderToday();renderKidsPage();renderNotif();updateBadge();toast('All data cleared');}

// MIDNIGHT RESET
function schedMidnight(){const now=new Date();const m=new Date(now);m.setHours(24,0,5,0);setTimeout(()=>{S.checks={};saveS();renderToday();updateBadge();schedMidnight();},m-now);}

// ICON GENERATION — draws pink background + pill emoji on canvas, injects as apple-touch-icon
(function(){
  try {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    // Pink rounded rect background
    const r = 112;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(512 - r, 0);
    ctx.quadraticCurveTo(512, 0, 512, r);
    ctx.lineTo(512, 512 - r);
    ctx.quadraticCurveTo(512, 512, 512 - r, 512);
    ctx.lineTo(r, 512);
    ctx.quadraticCurveTo(0, 512, 0, 512 - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#D4537E';
    ctx.fill();
    // Pill emoji centered
    ctx.font = '300px Apple Color Emoji, Segoe UI Emoji, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💊', 256, 272);
    // Inject as apple-touch-icon
    const dataUrl = c.toDataURL('image/png');
    const link = document.getElementById('apple-touch-icon');
    if (link) link.href = dataUrl;
    // Also set favicon
    const fav = document.createElement('link');
    fav.rel = 'icon'; fav.type = 'image/png';
    fav.href = dataUrl;
    document.head.appendChild(fav);
  } catch(e) {}
})();

// INIT
loadS();
if(!localStorage.getItem('mb_pin_v3'))document.getElementById('lk-hint').textContent='First time? Default PIN is 1234 — change it in Settings.';
const lastDay=localStorage.getItem('mb_day_v3');
const today=todayKey();
if(lastDay&&lastDay!==today){S.checks={};saveS();}
localStorage.setItem('mb_day_v3',today);
schedMidnight();
</script>
